<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MyBrand</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(108, 99, 255, 0.2), transparent 70%);
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* ── NAVBAR (identik dengan index.html) ── */
    nav {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 60px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-logo img {
      width: 36px;
      height: 36px;
    }

    .nav-logo span {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #fff;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-login {
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .nav-cta {
      background: linear-gradient(135deg, #6c63ff, #48cfad);
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .nav-cta:hover {
      opacity: 0.85;
    }

    /* ── LOGIN WRAPPER ── */
    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 48px 20px 32px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── CARD ── */
    .login-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 36px;
      backdrop-filter: blur(12px);
    }

    .login-card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-card p.subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      opacity: 0.4;
      pointer-events: none;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 12px 14px 12px 42px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    input:focus {
      border-color: #6c63ff;
      background: rgba(108, 99, 255, 0.08);
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.55);
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #6c63ff;
      cursor: pointer;
      padding: 0;
    }

    .forgot-link {
      font-size: 0.85rem;
      color: #6c63ff;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .forgot-link:hover {
      opacity: 0.75;
    }

    /* ── TOMBOL LOGIN ── */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #6c63ff, #48cfad);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-login:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    /* ── SOCIAL ── */
    .social-buttons {
      display: flex;
      gap: 12px;
    }

    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 11px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-social:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .register-link {
      text-align: center;
      margin-top: 28px;
      font-size: 0.88rem;
      color: rgba(255, 255, 255, 0.45);
    }

    .register-link a {
      color: #6c63ff;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .register-link a:hover {
      opacity: 0.75;
    }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: rgba(255, 255, 255, 0.6);
    }

    @media (max-width: 640px) {
      nav {
        padding: 16px 24px;
      }
      .nav-links {
        display: none;
      }
      .login-card {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a class="nav-logo" href="index.html">
      <img src="favicon.ico" alt="Logo" />
      <span>MyBrand</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html#features">Fitur</a></li>
      <li><a href="index.html#about">Tentang</a></li>
      <li><a href="index.html#contact">Kontak</a></li>
    </ul>
    <div class="nav-actions">
      <a href="login.html" class="nav-login">Masuk</a>
      <button class="nav-cta" onclick="window.location.href='login.html'">Daftar Gratis</button>
    </div>
  </nav>

  <!-- FORM LOGIN -->
  <div class="login-wrapper">
    <div class="login-card">
      <h1>Selamat Datang</h1>
      <p class="subtitle">Masuk ke akun Anda untuk melanjutkan</p>

      <form id="loginForm" onsubmit="handleLogin(event)">

        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <span class="icon">✉️</span>
            <input type="email" id="email" placeholder="nama@email.com" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="icon">🔒</span>
            <input type="password" id="password" placeholder="Masukkan password" required />
            <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Tampilkan password">👁️</button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember">
            <input type="checkbox" id="remember" />
            Ingat saya
          </label>
          <a href="#" class="forgot-link">Lupa password?</a>
        </div>

        <button type="submit" class="btn-login">Masuk</button>
      </form>

      <div class="divider">atau masuk dengan</div>

      <div class="social-buttons">
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Facebook
        </button>
      </div>

      <p class="register-link">
        Belum punya akun? <a href="#">Daftar sekarang</a>
      </p>
    </div>

    <a href="index.html" class="back-link">← Kembali ke beranda</a>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-login');
      btn.textContent = 'Memproses...';
      btn.disabled = true;
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
    }
  </script>

</body>
</html>
